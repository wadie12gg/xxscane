name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with dev extras)
        run: pip install ".[dev]"

      - name: Byte-compile all sources
        run: python -m compileall -q xsscane core modules payloads utils

      - name: Run unit tests
        run: pytest

      - name: Smoke-test the CLI
        run: xsscane --version
